<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>话外音探测器</title>
<style>
  body {
    max-width: 600px;
    margin: 30px auto;
    padding: 20px;
    font-family: "Microsoft YaHei", sans-serif;
    background: #f6f8fa;
  }
  .card {
    background: white;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  h2 {
    margin-top: 0;
    color: #111;
  }
  .desc {
    color: #555;
    margin-bottom: 16px;
  }
  textarea {
    width: 100%;
    height: 110px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
    resize: none;
  }
  button {
    margin-top: 10px;
    padding: 12px 20px;
    width: 100%;
    background: #1677ff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .result {
    margin-top: 20px;
    padding: 16px;
    background: #f7f8fa;
    border-radius: 8px;
    white-space: pre-line;
    line-height: 1.6;
    color: #222;
  }
  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #999;
    text-align: center;
  }
</style>
</head>

<body>
<div class="card">
  <h2>🗣️ 话外音探测器</h2>
  <p class="desc">输入一句话，AI 帮你分析深层含义、性格与真实动机</p>

  <textarea id="inputText" placeholder="请输入要分析的中文句子..."></textarea>
  <button onclick="analyze()">开始分析</button>

  <div class="result" id="result"></div>
</div>

<div class="footer">
  开源版 | 更多功能请使用专业订阅版
</div>

<script>
async function analyze() {
  const text = document.getElementById("inputText").value.trim();
  const resEl = document.getElementById("result");

  if (!text) {
    resEl.innerText = "请输入一句话";
    return;
  }

  resEl.innerText = "正在分析中...";

  const prompt = `
你是一位中文语义分析专家，请分析下面这句话：
“${text}”

请严格按以下格式输出：

【表面意思】
（直接写字面意思）

【话外音（1～3层）】
1.
2.
3.

【说话人性格特点】
（简短3～5条）

【真实想法】
（对方真正想表达什么）
`;

  try {
    const response = await fetch("https://api.aichatos.site/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "gpt-3.5-turbo",
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    resEl.innerText = data.choices?.[0]?.message?.content || "分析失败，请重试";
  } catch (e) {
    resEl.innerText = "服务暂时不可用，请稍后再试";
  }
}
</script>
</body>
</html>
