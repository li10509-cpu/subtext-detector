<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>话外音探测器</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

body {
    background-color: #f7f8fa;
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
    color: #333;
    line-height: 1.6;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 24px;
}

h1 {
    font-size: 24px;
    color: #222;
    margin-bottom: 8px;
    text-align: center;
}

.subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 24px;
    font-size: 14px;
}

textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    resize: none;
    min-height: 120px;
    outline: none;
    transition: border 0.2s;
}

textarea:focus {
    border-color: #4a90e2;
}

button {
    width: 100%;
    padding: 14px;
    background-color: #4a90e2;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
    cursor: pointer;
    transition: background 0.2s;
}

button:hover {
    background-color: #357abd;
}

.result {
    white-space: pre-line;
    line-height: 1.7;
    font-size: 15px;
}

.result strong {
    color: #222;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🗣️ 话外音探测器</h1>
    <div class="subtitle">读懂一句话背后的真实情绪</div>

    <textarea id="text" placeholder="请输入你想分析的话，例如：你说的都对"></textarea>
    <button onclick="analyze()">开始分析</button>
</div>

<div class="card">
    <h3>📊 分析结果</h3>
    <br>
    <div id="result" class="result">请输入文字并点击分析</div>
</div>

<div class="footer">我的AI小工具 · 安全简洁</div>

<script>
function analyze() {
    let t = document.getElementById("text").value.trim();
    if (!t) {
        document.getElementById("result").innerText = "请先输入内容";
        return;
    }

    let res = `【你说的话】
${t}

【表面意思】
对方在表达顺从、认同或结束对话

【真实话外音】
- 不想再争论
- 内心并不认同
- 情绪有点失望、无奈、敷衍
- 其实希望被理解、被温柔对待

【潜台词】
我不想吵了，你说什么都好，但我心里并不舒服

【建议】
不要继续讲道理，
可以轻声问：你是不是有点委屈？
比争对错更有用。`;

    document.getElementById("result").innerText = res;
}
</script>

</body>
</html>
