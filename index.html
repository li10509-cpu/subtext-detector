<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>话外音探测器</title>
</head>
<body>
<h1>🗣️ 话外音探测器（稳定版）</h1>
<textarea id="text" rows="4" cols="40" placeholder="输入你想分析的话"></textarea>
<br><br>
<button onclick="analyze()">开始分析</button>
<hr>
<h3>结果：</h3>
<p id="result"></p>

<script>
function analyze() {
  let text = document.getElementById("text").value;
  document.getElementById("result").innerText =
  "【表面意思】: " + text +
  "\n\n【话外音】: 对方可能在掩饰情绪，不想直接表达真实想法"+
  "\n\n【潜台词】: 我现在需要被理解、被关心"+
  "\n\n【建议】: 温柔回应，不要硬碰硬";
}
</script>
</body>
</html>
